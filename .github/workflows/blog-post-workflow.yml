name: Latest blog post workflow
on:
    schedule:
        - cron: '0 0 * * 1'
    workflow_dispatch:
permissions:
    contents: write
jobs:
    update-readme-with-blog:
        name: Update this repo's README with latest blog posts
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Update Qiita posts
              uses: gautamkrishnar/blog-post-workflow@v1
              with:
                max_post_count: "4"
                feed_list: "https://qiita.com/revsystem/feed"
                skip_commit: true
            - name: Update Note posts
              uses: gautamkrishnar/blog-post-workflow@v1
              with:
                comment_tag_name: "NOTE"
                max_post_count: "4"
                feed_list: "https://note.com/revsystem/rss"
                skip_commit: true
            - name: Commit and push if README changed
              uses: stefanzweifel/git-auto-commit-action@v5
              with:
                commit_message: "Updated with the latest blog posts"
                file_pattern: README.md
                commit_user_name: blog-post-bot
                commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
                commit_author: blog-post-bot <41898282+github-actions[bot]@users.noreply.github.com>
